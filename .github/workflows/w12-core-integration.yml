name: W12 Core Integration

on:
  pull_request:
    paths:
      - package.json
      - .github/workflows/w12-core-integration.yml
      - docs/development/core-integration.md
      - docs/roadmap/current-development-state.md
      - docs/release/release-checklist.md
      - docs/release/known-limitations.md
      - docs/index.md
      - docs/README.md
      - tests/integration/w12b-real-core-host-composition.test.mjs
      - tests/integration/w12c-adapter-real-core-fake-telegram-e2e.test.mjs
      - tests/integration/w12d-callback-token-real-core-lifecycle.test.mjs
      - tests/static/w12-core-public-import-boundary.test.mjs
  workflow_dispatch:

permissions:
  contents: read

jobs:
  w12-core-integration:
    name: Pinned core public API integration proof
    runs-on: ubuntu-latest
    env:
      HAZETEAM_CORE_REPOSITORY: NordCoder/hazeteam-core
      HAZETEAM_CORE_PINNED_SHA: 8eb7a3b3675a0779763067a1022cce75e63d1226
    steps:
      - name: Checkout hazeteam-openclaw
        uses: actions/checkout@v4
        with:
          path: hazeteam-openclaw

      - name: Verify hazeteam-core checkout token
        run: |
          if [ "${{ secrets.HAZETEAM_CORE_READ_TOKEN == '' }}" = "true" ]; then
            echo "::error::W12 core integration requires HAZETEAM_CORE_READ_TOKEN with read-only contents access to NordCoder/hazeteam-core."
            exit 1
          fi
          echo "W12 core integration private core checkout token is configured."

      - name: Checkout pinned hazeteam-core
        uses: actions/checkout@v4
        with:
          repository: NordCoder/hazeteam-core
          ref: ${{ env.HAZETEAM_CORE_PINNED_SHA }}
          path: hazeteam-core
          token: ${{ secrets.HAZETEAM_CORE_READ_TOKEN }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install hazeteam-core dependencies
        working-directory: hazeteam-core
        run: npm install

      - name: Build hazeteam-core
        working-directory: hazeteam-core
        run: npm run build

      - name: Pack hazeteam-core locally
        id: pack-core
        working-directory: hazeteam-core
        run: |
          pack_dir="$PWD/../hazeteam-core-pack"
          rm -rf "$pack_dir"
          mkdir -p "$pack_dir"
          cp package.json "$pack_dir/package.json"
          cp -R dist "$pack_dir/dist"

          for required_dist_file in \
            dist/foundation/index.js \
            dist/host/index.js \
            dist/presentation/index.js
          do
            if [ ! -f "$pack_dir/$required_dist_file" ]; then
              echo "::error::Staged hazeteam-core package is missing required public export target: $required_dist_file"
              exit 1
            fi
          done

          cd "$pack_dir"
          core_tarball="$(npm pack --silent)"
          echo "tarball=$PWD/$core_tarball" >> "$GITHUB_OUTPUT"
          echo "hazeteam-core ref: $HAZETEAM_CORE_PINNED_SHA"
          echo "core import mode: local npm pack tarball"

      - name: Install hazeteam-openclaw dependencies
        working-directory: hazeteam-openclaw
        run: npm install

      - name: Install local hazeteam-core tarball
        working-directory: hazeteam-openclaw
        run: npm install --no-save "${{ steps.pack-core.outputs.tarball }}"

      - name: Build hazeteam-openclaw
        working-directory: hazeteam-openclaw
        run: npm run build

      - name: Run static boundary tests
        working-directory: hazeteam-openclaw
        run: npm run test:static

      - name: Run W12 core integration tests
        working-directory: hazeteam-openclaw
        run: npm run test:core-integration
